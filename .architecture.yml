# Architecture rules for diagram-cli itself (dogfooding!)
version: "1.0"

rules:
  # Use inward_only for core layers that should be protected
  - name: "Rules engine isolation"
    layer: "src/rules/**"
    inward_only: true
    # Other inward_only layers cannot import from rules engine

  - name: "Graph builder isolation"
    layer: "src/graph.js"
    inward_only: true
    # Core data structure - protected from other inward_only layers

  - name: "Schema purity"
    layer: "src/schema/**"
    inward_only: true
    # Validation layer - pure, no runtime deps

  # Explicit constraints for non-core layers
  - name: "Formatters isolation"
    layer: "src/formatters/**"
    must_not_import_from:
      - "src/rules"
      - "src/graph.js"
      - "src/schema"

  - name: "Utils independence"
    layer: "src/utils/**"
    must_not_import_from:
      - "src/rules"
      - "src/graph.js"
      - "src/formatters"
      - "src/schema"
      - "src/video.js"

  - name: "Video isolation"
    layer: "src/video.js"
    must_not_import_from:
      - "src/rules"
      - "src/graph.js"
      - "src/schema"
      - "src/formatters"

  # CLI entrypoint can import from anywhere (it's the orchestrator)
  # No constraint on src/diagram.js
