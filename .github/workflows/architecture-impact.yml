name: Architecture Impact Analysis

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

env:
  OUTPUT_DIR: .diagram/pr-impact

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "25"

      - name: Configure npm for private packages
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" >> ~/.npmrc

      - name: Install dependencies
        run: npm install

      - name: Run architecture impact analysis
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          node src/diagram.js workflow pr . \
            --base "$BASE_SHA" \
            --head "$HEAD_SHA" \
            --output-dir "$OUTPUT_DIR" \
            --verbose

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pr-impact
          path: .diagram/pr-impact/
          retention-days: 30

  risk-gate:
    needs: analyze
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "25"

      - name: Configure npm for private packages
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" >> ~/.npmrc

      - name: Install dependencies
        run: npm install

      - name: Check risk threshold
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          node src/diagram.js workflow pr . \
            --base "$BASE_SHA" \
            --head "$HEAD_SHA" \
            --risk-threshold high \
            --fail-on-risk
