name: PR Architecture Impact Comment

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write
  contents: read

jobs:
  comment:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run PR impact analysis
        id: analyze
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          node src/diagram.js workflow pr . \
            --base "$BASE_SHA" \
            --head "$HEAD_SHA" \
            --json > pr-impact.json

      - name: Build comment body
        id: comment
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          # Parse JSON and build comment
          CHANGED_COMPONENTS=$(jq '.changedComponents | length' pr-impact.json)
          BLAST_RADIUS=$(jq '.blastRadius.impactedComponents | length' pr-impact.json)
          RISK_LEVEL=$(jq -r '.risk.level' pr-impact.json)
          RISK_SCORE=$(jq '.risk.score' pr-impact.json)
          TRUNCATED=$(jq '.blastRadius.truncated' pr-impact.json)
          OMITTED=$(jq '.blastRadius.omittedCount' pr-impact.json)

          # Risk emoji
          case "$RISK_LEVEL" in
            high) RISK_EMOJI="🔴" ;;
            medium) RISK_EMOJI="🟡" ;;
            low) RISK_EMOJI="🟢" ;;
            none) RISK_EMOJI="⚪" ;;
            *) RISK_EMOJI="⚪" ;;
          esac

          # Build blast radius note
          if [ "$TRUNCATED" = "true" ]; then
            BLAST_NOTE="+ $OMITTED more (truncated)"
          else
            BLAST_NOTE=""
          fi

          # Get risk flags
          RISK_FLAGS=$(jq -r '.risk.flags | join(", ")' pr-impact.json)
          if [ -n "$RISK_FLAGS" ] && [ "$RISK_FLAGS" != "" ]; then
            FLAGS_SECTION="**Risk factors:** $RISK_FLAGS"
          else
            FLAGS_SECTION=""
          fi

          # Check for override
          OVERRIDE=$(jq '.risk.override.applied' pr-impact.json)
          if [ "$OVERRIDE" = "true" ]; then
            OVERRIDE_REASON=$(jq -r '.risk.override.reason' pr-impact.json)
            OVERRIDE_SECTION="> ⚠️ **Risk gate overridden:** $OVERRIDE_REASON"
          else
            OVERRIDE_SECTION=""
          fi

          # Build comment
          cat > comment.md << EOF
          ## 📊 Architecture Impact Analysis

          | Metric | Value |
          |--------|-------|
          | Changed Components | $CHANGED_COMPONENTS |
          | Blast Radius | $BLAST_RADIUS $BLAST_NOTE |
          | Risk Level | $RISK_EMOJI **$RISK_LEVEL** (score: $RISK_SCORE) |

          $FLAGS_SECTION

          $OVERRIDE_SECTION

          <details>
          <summary>📋 Details</summary>

          \`\`\`json
          $(jq -c '.' pr-impact.json)
          \`\`\`
          </details>

          ---
          *Generated by [diagram-cli](https://github.com/jscraik/diagram-cli)*
          EOF

          echo "comment_file=comment.md" >> $GITHUB_OUTPUT

      - name: Find existing comment
        id: find-comment
        uses: peter-evans/find-comment@v3
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: 'github-actions[bot]'
          body-includes: 'Architecture Impact Analysis'

      - name: Create or update comment
        uses: peter-evans/create-or-update-comment@v4
        with:
          comment-id: ${{ steps.find-comment.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          body-path: comment.md
          edit-mode: replace
